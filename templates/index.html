<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPT Google — Meeting → Presentation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .logo {
      font-size: 13px;
      color: #555;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      text-align: center;
    }
    .sub {
      color: #666;
      font-size: 16px;
      margin-bottom: 40px;
      text-align: center;
    }
    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
    }
    .tabs {
      display: flex;
      gap: 4px;
      background: #0a0a0a;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      color: #555;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
    }
    .tab.active {
      background: #1e1e1e;
      color: #e0e0e0;
    }
    .panel { display: none; }
    .panel.active { display: block; }

    .drop-zone {
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #4f8ef7;
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .drop-icon { font-size: 32px; margin-bottom: 8px; }
    .drop-label { color: #666; font-size: 14px; }
    .drop-hint { color: #444; font-size: 12px; margin-top: 4px; }
    .file-name { color: #4f8ef7; font-size: 14px; margin-top: 8px; }

    textarea {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 12px;
      resize: vertical;
      min-height: 160px;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #333; }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }
    .field label {
      display: block;
      font-size: 12px;
      color: #555;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 8px 10px;
    }
    .field input:focus { outline: none; border-color: #333; }

    .btn {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: #4f8ef7;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #3a7ae0; }
    .btn:disabled { background: #222; color: #555; cursor: not-allowed; }

    .status {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      color: #666;
      min-height: 20px;
    }
    .status.error { color: #e05a5a; }
    .status a { color: #4f8ef7; text-decoration: none; }
    .status a:hover { text-decoration: underline; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #333;
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">PPT Google</div>
  <h1>Meeting → Presentation</h1>
  <p class="sub">Upload a recording or paste a transcript — get a shareable deck.</p>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('audio')">Audio / Video</button>
      <button class="tab" onclick="switchTab('text')">Transcript</button>
    </div>

    <form id="uploadForm">
      <!-- Audio panel -->
      <div class="panel active" id="panel-audio">
        <div class="drop-zone" id="dropZone">
          <input type="file" id="audioFile" accept=".mp3,.mp4,.m4a,.wav,.ogg,.webm,.flac" />
          <div class="drop-icon">🎙</div>
          <div class="drop-label">Drop audio or video file here</div>
          <div class="drop-hint">MP3, MP4, M4A, WAV, OGG, WebM · up to 25 MB</div>
          <div class="file-name" id="fileName"></div>
        </div>
      </div>

      <!-- Text panel -->
      <div class="panel" id="panel-text">
        <textarea id="transcriptText" placeholder="Paste your meeting transcript here..."></textarea>
      </div>

      <div class="options">
        <div class="field">
          <label>Audience (optional)</label>
          <input type="text" id="audience" placeholder="e.g. investors, team" />
        </div>
        <div class="field">
          <label>Goal (optional)</label>
          <input type="text" id="goal" placeholder="e.g. get buy-in" />
        </div>
      </div>

      <button type="submit" class="btn" id="submitBtn">Generate Presentation</button>
    </form>

    <div class="status" id="status"></div>
  </div>

  <script>
    let activeTab = 'audio';

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'audio') || (i === 1 && tab === 'text'));
      });
      document.getElementById('panel-audio').classList.toggle('active', tab === 'audio');
      document.getElementById('panel-text').classList.toggle('active', tab === 'text');
    }

    document.getElementById('audioFile').addEventListener('change', e => {
      const f = e.target.files[0];
      document.getElementById('fileName').textContent = f ? f.name : '';
    });

    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const f = e.dataTransfer.files[0];
      if (f) {
        document.getElementById('audioFile').files = e.dataTransfer.files;
        document.getElementById('fileName').textContent = f.name;
      }
    });

    document.getElementById('uploadForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const status = document.getElementById('status');

      const formData = new FormData();
      formData.append('audience', document.getElementById('audience').value);
      formData.append('goal', document.getElementById('goal').value);

      if (activeTab === 'audio') {
        const file = document.getElementById('audioFile').files[0];
        if (!file) { status.textContent = 'Please select an audio file.'; status.className = 'status error'; return; }
        formData.append('file', file);
      } else {
        const text = document.getElementById('transcriptText').value.trim();
        if (!text) { status.textContent = 'Please paste a transcript.'; status.className = 'status error'; return; }
        formData.append('transcript', text);
      }

      btn.disabled = true;
      status.className = 'status';
      status.innerHTML = '<span class="spinner"></span>Processing… this takes 30-60 seconds';

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Server error');
        status.innerHTML = `Done! <a href="${data.url}" target="_blank">Open presentation →</a>`;
      } catch (err) {
        status.textContent = err.message;
        status.className = 'status error';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
